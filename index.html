<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">

<title>日本語れんしゅう</title>
<meta name="description" content="日本語を練習するためのアプリです。">
<meta name="theme-color" content="#fff7fb">
<meta name="application-name" content="日本語れんしゅう">
<meta name="apple-mobile-web-app-title" content="日本語れんしゅう">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="mobile-web-app-capable" content="yes">
<meta name="msapplication-TileColor" content="#fff7fb">
<meta name="msapplication-TileImage" content="practice.png">
<link rel="icon" type="image/png" href="practice.png">
<link rel="shortcut icon" type="image/png" href="practice.png">
<link rel="apple-touch-icon" href="practice.png">
<link rel="apple-touch-icon-precomposed" href="practice.png">
<link rel="manifest" href="manifest.webmanifest">

<style>
  @import url("https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Ma+Shan+Zheng&family=ZCOOL+KuaiLe&display=swap");

  * {
    box-sizing: border-box;
  }

  html {
    touch-action: manipulation;
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
  }

  body {
    margin: 0;
    font-family: "Hiragino Maru Gothic ProN", "Yu Gothic", sans-serif;
    background: linear-gradient(180deg, #fff7fb, #eef9ff);
    color: #333;
    overflow-x: hidden;
    touch-action: manipulation;
  }

  .screen {
    min-height: 100vh;
    padding: 18px;
  }

  body.home-mode,
  body.menu-mode {
    height: 100vh;
    overflow: hidden;
    overscroll-behavior: none;
  }

  body.home-mode #homeScreen,
  body.menu-mode #menuScreen {
    height: 100vh;
    height: 100svh;
    overflow: hidden;
    touch-action: none;
  }

  #homeScreen {
    display: block;
  }

  #menuScreen {
    display: none;
  }

  .home-panel {
    min-height: calc(100vh - 36px);
    min-height: calc(100svh - 36px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
  }

  .home-title {
    text-align: center;
    font-size: 28px;
    font-weight: 900;
    color: #ff6fae;
    line-height: 1.05;
    margin-bottom: 4px;
  }

  .home-title-subtitle {
    display: block;
    margin-top: 8px;
    color: #777;
    font-size: 17px;
    font-weight: 900;
  }

  .home-actions {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 14px;
    align-items: center;
    justify-items: center;
  }

  .home-btn {
    width: min(38vw, 168px);
    height: min(38vw, 168px);
    border: none;
    border-radius: 28px;
    font-size: 31px;
    font-weight: 900;
    color: #555;
    background: #fff0f6;
    box-shadow: 0 7px 0 #ffd1e6, 0 12px 20px rgba(0,0,0,0.10);
    cursor: pointer;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    position: relative;
  }

  .home-btn:active {
    transform: translateY(5px);
    box-shadow: 0 2px 0 #ffd1e6, 0 6px 12px rgba(0,0,0,0.10);
  }

  .home-btn.listen-btn {
    background: #eaf8ff;
    box-shadow: 0 7px 0 #cfeeff, 0 12px 20px rgba(0,0,0,0.10);
  }

  .home-btn.speak-btn {
    background: #fffbe3;
    box-shadow: 0 7px 0 #eee2a4, 0 12px 20px rgba(0,0,0,0.10);
  }

  .home-btn.connect-btn {
    background: #f0faeb;
    box-shadow: 0 7px 0 #d1e5ca, 0 12px 20px rgba(0,0,0,0.10);
  }

  .home-btn.conjugation-btn {
    background: #ffe8f5;
    box-shadow: 0 7px 0 #ffd0e7, 0 12px 20px rgba(0,0,0,0.10);
  }

  .page-title {
    text-align: center;
    font-size: 24px;
    font-weight: bold;
    color: #ff6fae;
    margin: 12px 0 18px;
  }

  .menu-title-row {
    position: relative;
    min-height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .menu-title-row .page-title {
    flex: 1;
    margin: 12px 0 18px;
  }

  .title-emoji {
    display: inline-block;
    vertical-align: middle;
  }

  .title-emoji.left {
    transform: scaleX(-1);
    margin-right: 0.25em;
  }

  .title-emoji.right {
    margin-left: 0.25em;
  }

  .button-grid {
    max-width: 560px;
    margin: 0 auto;
    padding: 0 14px;
  }

  .menu-page {
    display: none;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 14px;
    width: 100%;
  }

  .menu-page.active {
    display: grid;
  }


  .menu-btn {
    width: 100%;
    min-height: 62px;
    border: none;
    border-radius: 18px;
    font-size: 18px;
    font-weight: bold;
    color: #555;
    background: #fff0f6;
    box-shadow: 0 5px 0 #ffd1e6, 0 8px 14px rgba(0,0,0,0.08);
    cursor: pointer;
    display: block;
    white-space: nowrap;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    position: relative;
  }

  .open-count-badge {
    position: absolute;
    z-index: 3;
    display: block;
    right: 8px;
    bottom: 4px;
    color: rgba(85, 85, 85, 0.55);
    -webkit-text-fill-color: rgba(85, 85, 85, 0.55);
    font-size: 6px;
    font-weight: 400;
    line-height: 1;
    text-align: center;
    pointer-events: none;
  }

  .home-btn .open-count-badge {
    right: 10px;
    bottom: 6px;
    font-size: 6px;
  }

  .menu-btn:active {
    transform: translateY(4px);
    box-shadow: 0 1px 0 #ffd1e6, 0 4px 8px rgba(0,0,0,0.08);
  }

  .menu-btn:disabled,
  .menu-page.disabled-page .menu-btn {
    opacity: 0.35;
    cursor: not-allowed;
    pointer-events: none;
    filter: grayscale(0.45);
  }

  .menu-btn.menu-btn-medium {
    font-size: 17px;
  }

  .menu-btn.menu-btn-small {
    font-size: 16px;
  }

  .menu-btn.menu-btn-xsmall {
    font-size: 15px;
  }

  .menu-btn.basic-verb-btn {
    background: #ffe8f5;
    box-shadow: 0 5px 0 #ffd0e7, 0 8px 14px rgba(0,0,0,0.08);
  }

  .menu-btn.basic-verb-btn:active {
    box-shadow: 0 1px 0 #ffd0e7, 0 4px 8px rgba(0,0,0,0.08);
  }

  .menu-btn.basic-adjective-btn {
    background: #eaf8ff;
    box-shadow: 0 5px 0 #cfeeff, 0 8px 14px rgba(0,0,0,0.08);
  }

  .menu-btn.basic-adjective-btn:active {
    box-shadow: 0 1px 0 #cfeeff, 0 4px 8px rgba(0,0,0,0.08);
  }

  .page-nav {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    z-index: 80;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 7px;
    user-select: none;
  }

  .page-nav.left-nav {
    left: 9px;
  }

  .page-nav.right-nav {
    right: 9px;
  }

  .page-arrow {
    width: 44px;
    height: 44px;
    border: none;
    border-radius: 999px;
    background: #111;
    color: white;
    font-size: 24px;
    line-height: 1;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 5px 14px rgba(0,0,0,0.24);
    cursor: pointer;
    animation: slowPulse 1.8s ease-in-out infinite;
  }

  .page-arrow:active {
    transform: scale(0.92);
  }

  .page-nav.disabled {
    opacity: 0.22;
    pointer-events: none;
  }

  .page-nav.disabled .page-arrow {
    background: rgba(0,0,0,0.45);
    box-shadow: none;
  }

  .page-nav-label {
    min-width: 48px;
    padding: 3px 6px;
    border-radius: 999px;
    background: rgba(255,255,255,0.78);
    color: #222;
    font-size: 12px;
    font-weight: bold;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  @keyframes slowPulse {
    0%, 100% {
      transform: scale(0.99);
      box-shadow: 0 5px 14px rgba(0,0,0,0.24);
    }
    50% {
      transform: scale(1.10);
      box-shadow: 0 8px 22px rgba(0,0,0,0.34);
    }
  }



  .masu-table-holder {
    position: relative;
  }

  .masu-table col.masu-left-col {
    width: 45%;
  }

  .masu-table col.masu-right-col {
    width: 55%;
  }

  .masu-swap-btn {
    position: absolute;
    top: 7px;
    left: 50%;
    z-index: 6;
    width: 38px;
    height: 38px;
    border: none;
    border-radius: 50%;
    background: #111;
    color: white;
    font-size: 19px;
    font-weight: 900;
    line-height: 1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 5px 14px rgba(0,0,0,0.24);
    animation: slowPulseCenter 2.6s ease-in-out infinite;
    transform: translateX(-50%);
    touch-action: manipulation;
  }

  .masu-swap-btn:active {
    transform: translateX(-50%) scale(0.92);
  }

  @keyframes slowPulseCenter {
    0%, 100% {
      transform: translateX(-50%) scale(1);
      box-shadow: 0 5px 14px rgba(0,0,0,0.24);
    }
    50% {
      transform: translateX(-50%) scale(1.11);
      box-shadow: 0 8px 22px rgba(0,0,0,0.34);
    }
  }

  @media (max-width: 420px) {
    .button-grid {
      max-width: 360px;
      padding: 0 10px;
    }

    .menu-page {
      gap: 12px;
    }

    .menu-btn {
      min-height: 56px;
      font-size: 16px;
      border-radius: 16px;
    }

    .menu-btn.menu-btn-medium {
      font-size: 16px;
    }

    .menu-btn.menu-btn-small {
      font-size: 15px;
    }

    .menu-btn.menu-btn-xsmall {
      font-size: 14px;
    }

    .page-nav.left-nav {
      left: 4px;
    }

    .page-nav.right-nav {
      right: 4px;
    }

    .page-arrow {
      width: 38px;
      height: 38px;
      font-size: 21px;
    }

    .page-nav-label {
      min-width: 42px;
      font-size: 11px;
    }
  }

  .empty {
    display: none;
  }

  #tableScreen {
    display: none;
    min-height: 100vh;
    background: linear-gradient(180deg, #fff7fb, #ffffff);
  }

  .top-bar {
    position: sticky;
    top: 0;
    z-index: 30;
    height: 58px;
    background: rgba(255, 247, 251, 0.96);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-bottom: 2px solid #ffd1e6;
  }

  .back-btn {
    border: none;
    border-radius: 999px;
    background: #ff8ac2;
    color: white;
    font-size: 15px;
    font-weight: bold;
    padding: 9px 14px;
    box-shadow: 0 3px 0 #e15d9d;
    cursor: pointer;
  }

  .back-btn:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 #e15d9d;
  }

  .menu-back-btn {
    position: fixed;
    left: 12px;
    top: 10px;
    z-index: 80;
  }

  .back-btn.menu-back-btn:active {
    transform: translateY(2px);
  }

  .back-arrow-icon {
    display: inline-block;
    transform: scaleX(-1);
  }

  .random-order-btn {
    width: 48px;
    height: 48px;
    flex: 0 0 48px;
    border: none;
    border-radius: 50%;
    background: #111;
    color: white;
    font-size: 13px;
    font-weight: 900;
    line-height: 1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 5px 14px rgba(0,0,0,0.24);
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .random-order-btn:active {
    transform: scale(0.92);
    box-shadow: 0 2px 8px rgba(0,0,0,0.20);
  }

  .table-title {
    flex: 1;
    text-align: center;
    font-size: 21px;
    font-weight: bold;
    color: #ff6fae;
    padding-right: 0;
  }

  .table-wrap {
    position: relative;
    padding: 18px 12px 0 12px;
    overflow-x: hidden;
    overflow-y: visible;
  }

  table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0 8px;
    font-size: 18px;
    table-layout: fixed;
  }

  th {
    padding: 10px;
    background: #ffb3d5;
    color: white;
    font-size: 16px;
  }

  th:first-child {
    border-radius: 14px 0 0 14px;
  }

  th:last-child {
    border-radius: 0 14px 14px 0;
  }

  td {
    height: 53px;
    padding: 8px 7px;
    background: white;
    text-align: center;
    font-weight: bold;
    box-shadow: 0 3px 10px rgba(0,0,0,0.06);
  }

  td:first-child {
    border-radius: 14px 0 0 14px;
    color: #555;
  }

  td:last-child {
    border-radius: 0 14px 14px 0;
    color: #d90000;
  }

  tr.ichidan td {
    background: #f0fbff;
  }
.group-row td {
    height: 42px;
    background: #ffe4f1 !important;
    color: #ff5ca8 !important;
    font-size: 16px;
    text-align: left;
    padding-left: 16px;
    border-radius: 14px !important;
  }

  #tableArea tr.vocab-special td {
    background: #dff8ff !important;
  }

  #tableArea tr.vocab-special .question-box {
    background: #dff8ff !important;
    border-color: #8ed8ea !important;
  }

  ruby {
    ruby-position: over;
  }

  rt {
    font-size: 12px;
    color: #777;
    font-weight: normal;
    line-height: 1;
  }

  .word-cell-inner {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 8px;
    width: 100%;
  }

  .word-text {
    flex: 1;
    text-align: center;
    padding-right: 30px;
  }

  .question-box {
    width: 30px;
    height: 30px;
    flex: 0 0 30px;
    border: 1px dashed #dcdcdc;
    border-radius: 7px;
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    cursor: pointer;
    position: relative;
  }

  .question-svg {
    width: 24px;
    height: 24px;
    display: block;
    overflow: visible;
    transform: translateY(1px);
  }

  .question-glyph {
    fill: none;
    stroke: #dcdcdc;
    stroke-width: 1;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 2.4 2.4;
    paint-order: stroke;

    font-family: "Arial Rounded MT Bold", "Hiragino Maru Gothic ProN", "Yu Gothic", sans-serif;
    font-size: 25px;
    font-weight: 800;
  }
.question-box:active {
    transform: scale(0.92);
  }

  .answer-text {
    display: inline-block;
    position: relative;
    color: #d90000;

    -webkit-mask-repeat: no-repeat;
    -webkit-mask-position: 0 0;
    -webkit-mask-size: 100% 100%;

    mask-repeat: no-repeat;
    mask-position: 0 0;
    mask-size: 100% 100%;
    mask-mode: alpha;
    -webkit-mask-origin: border-box;
    mask-origin: border-box;

    will-change: auto;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    contain: paint;
    transform: translateZ(0);
  }

  .answer-mask-cover {
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    background: var(--answer-mask-bg, white);
    -webkit-clip-path: polygon(0 0, 0 0, 0 0);
    clip-path: polygon(0 0, 0 0, 0 0);
    transform: translateZ(0);
    will-change: clip-path;
  }

  .red-sheet {
    position: fixed;
    top: 185px;
    right: 0;
    width: 55vw;
    height: 424px;
    z-index: 10;
    pointer-events: none;
    border-radius: 22px 0 0 22px;
    overflow: hidden;

    background: rgba(255, 60, 60, 0.38);
    border-left: 4px solid rgba(220, 40, 40, 0.55);
    box-shadow: -6px 0 14px rgba(120, 0, 0, 0.14);

    transform: translateZ(0) rotate(2deg);
    transform-origin: right center;
    will-change: auto;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }

  body.sheet-high .red-sheet {
    top: 96px;
    height: 510px;
  }

  .scroll-extra-y {
    height: 0px;
  }

  .placeholder {
    margin-top: 20px;
    padding: 24px;
    border-radius: 20px;
    background: #fff0f6;
    color: #ff6fae;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
    box-shadow: 0 5px 14px rgba(0,0,0,0.06);
  }

  #tableArea table.listen-table {
    --table-font-size: 15px;
  }

  #tableArea .listen-prompt {
    display: inline-block;
    max-width: 100%;
    line-height: 1.05;
    text-align: left;
  }

  #tableArea .listen-prompt-text,
  #tableArea .listen-prompt-emoji {
    max-width: 100%;
  }

  #tableArea .listen-prompt-text {
    display: inline;
    font-size: 1em !important;
    white-space: normal !important;
    overflow-wrap: anywhere;
  }

  #tableArea .listen-prompt-break {
    display: block;
    content: "";
    margin-top: 3px;
  }

  #tableArea .listen-prompt.is-text-wrapped .listen-prompt-break {
    display: none;
  }

  #tableArea .listen-prompt-emoji {
    display: inline;
    white-space: nowrap !important;
  }

  #tableArea .listen-prompt-eye,
  #tableArea .listen-prompt-walker-reversed {
    display: inline-block;
    transform: scaleX(-1);
  }

  #tableArea .listen-prompt-direction {
    display: inline-flex;
    align-items: flex-end;
    gap: 0.1em;
    vertical-align: middle;
  }

  #tableArea .listen-prompt-arrow-question {
    position: relative;
    display: inline-block;
    min-width: 1.8em;
    margin-left: -0.12em;
    line-height: 1;
    vertical-align: baseline;
  }

  #tableArea .listen-prompt-arrow-question-mark {
    position: absolute;
    left: -0.02em;
    top: 50%;
    z-index: 1;
    color: #ff9fca;
    font-size: 0.9em;
    font-weight: 900;
    line-height: 1;
    transform: translateY(-58%) rotate(-8deg);
    text-shadow:
      0 0.05em 0 #fff,
      0.05em 0 0 #fff,
      0 -0.05em 0 #fff,
      -0.05em 0 0 #fff,
      0.02em 0 currentColor,
      -0.02em 0 currentColor,
      0 0.02em currentColor,
      0 -0.02em currentColor;
  }

  #tableArea .listen-prompt-long-arrow {
    display: inline-block;
    color: #111;
    font-size: 1em;
    font-weight: 900;
    line-height: 1;
    transform: scaleX(1.25);
    transform-origin: left center;
    text-shadow: 0.032em 0 0 currentColor;
  }

  #tableArea .listen-prompt-label {
    display: inline-block;
    padding: 0.02em 0.12em;
    border-radius: 0.1em;
    background: #ff8ac2;
    color: #fff;
    font-size: 0.72em;
    font-weight: 900;
    line-height: 1;
    vertical-align: middle;
  }

  #tableArea .listen-prompt-question {
    display: inline-block;
    color: #ff9fca;
    font-size: 1em;
    font-weight: 900;
    line-height: 1;
    text-shadow:
      0.03em 0 currentColor,
      -0.03em 0 currentColor,
      0 0.03em currentColor,
      0 -0.03em currentColor;
  }

  #tableArea .listen-prompt-emoji {
    font-size: 1em !important;
    line-height: 1;
  }

  #tableArea table th:first-child,
  #tableArea table td:first-child {
    width: 45%;
  }

  #tableArea table th:last-child,
  #tableArea table td:last-child {
    width: 55%;
  }





  /* ===== 修正版 v6：Vて、配色再調整 ===== */
  #tableArea tr.te-utsuru td {
    background: #f0faeb !important;  /* う・つ・る：かなり薄いミントグリーン */
  }

  #tableArea tr.te-mubunu td {
    background: #ffe0ef !important;  /* む・ぶ・ぬ：かなり薄いローズピンク */
  }

  #tableArea tr.te-ku td {
    background: #deefff !important;  /* く：かなり薄いスカイブルー */
  }

  #tableArea tr.te-gu td {
    background: #deefff !important;  /* ぐ：くグループと同じスカイブルー */
  }

  #tableArea tr.te-su td {
    background: #ffe8cc !important;  /* す：かなり薄いアプリコット */
  }

  #tableArea tr.te-iku td {
    background: #eee6ff !important;  /* 行く：かなり薄いラベンダー */
  }

  #tableArea tr.te-ichidan td {
    background: #fffbe3 !important;  /* 一段：かなり薄いレモンイエロー */
  }

<script>

function closeStartNotice() {
  const notice = document.getElementById("startNotice");
  if (notice) {
    notice.style.display = "none";
  }
}



const TOP_MEMO_DISPLAY_LIMIT = 8;
const MENU_MEMO_DISPLAY_LIMIT = 12;
const nonConjugationQuestionTypes = new Set(["聞く", "話す", "つなぐ"]);
let currentSection = "home";
const conjugationMenuHtml = document.getElementById("menuButtonGrid")?.innerHTML || "";

let currentHomeLevel = 1;
let currentHomeMenu = "main";
let currentVocabCountLevel = currentHomeLevel;
let currentConjugationCountLevel = currentHomeLevel;

const homeMenus = {
  0: {
    title: "基礎",
    buttons: [
      { label: "聞く", className: "listen-btn", action: "openListenPage()" },
      { label: "話す", className: "speak-btn", action: "openSpeakPage()" },
      { label: "語彙", className: "connect-btn", action: "openVocabMenu()" },
      { label: "活用", className: "conjugation-btn", action: "openConjugationMenu()" }
    ]
  },
  1: {
    title: "初級1",
    buttons: [
      { label: "聞く", className: "listen-btn", action: "openListenPage()" },
      { label: "話す", className: "speak-btn", action: "openSpeakPage()" },
      { label: "つなぐ", className: "connect-btn", action: "openConnectPage()" },
      { label: "活用", className: "conjugation-btn", action: "openConjugationMenu()" }
    ]
  }
};

const vocabCategories = ["数字", "数え方", "月・日付", "時間・分", "位置詞"];
const PAGE_OPEN_COUNT_STORAGE_KEY = "rensyuuPageOpenCounts_v1";
const PAGE_OPEN_COUNT_SCROLL_WORDS = 25;
const PAGE_OPEN_COUNT_INNER_SCROLL_WORDS = 10;
let activePageOpenTracker = null;

function readPageOpenCounts() {
  try {
    const parsed = JSON.parse(localStorage.getItem(PAGE_OPEN_COUNT_STORAGE_KEY) || "{}");
    return parsed && typeof parsed === "object" && !Array.isArray(parsed) ? parsed : {};
  } catch (error) {
    return {};
  }
}

function writePageOpenCounts(counts) {
  try {
    localStorage.setItem(PAGE_OPEN_COUNT_STORAGE_KEY, JSON.stringify(counts));
  } catch (error) {
    // localStorage が使えない環境では、表示だけ更新しない。
  }
}

function getPageOpenCountKey(level, type) {
  return `${level}:${type}`;
}

function getTableOpenCountTarget(type) {
  if (currentSection === "vocab") {
    return { level: currentVocabCountLevel, type: "語彙", scrollWords: PAGE_OPEN_COUNT_INNER_SCROLL_WORDS };
  }
  if (currentSection === "conjugation") {
    return { level: currentConjugationCountLevel, type: "活用", scrollWords: PAGE_OPEN_COUNT_INNER_SCROLL_WORDS };
  }
  return { level: currentHomeLevel, type, scrollWords: PAGE_OPEN_COUNT_SCROLL_WORDS };
}

function getPageOpenCount(level, type) {
  const counts = readPageOpenCounts();
  return Number(counts[getPageOpenCountKey(level, type)] || 0);
}

function incrementPageOpenCount(level, type) {
  const counts = readPageOpenCounts();
  const key = getPageOpenCountKey(level, type);
  counts[key] = Number(counts[key] || 0) + 1;
  writePageOpenCounts(counts);
  updateOpenCountBadges();
}

function makeOpenCountBadge(level, type) {
  const count = getPageOpenCount(level, type);
  return `<span class="open-count-badge" data-open-count-level="${level}" data-open-count-type="${escapeHtml(type)}">${count}</span>`;
}

function updateOpenCountBadges(root = document) {
  root.querySelectorAll(".open-count-badge").forEach(badge => {
    const level = Number(badge.dataset.openCountLevel);
    const type = badge.dataset.openCountType || "";
    badge.textContent = getPageOpenCount(level, type);
  });
}

function stopPageOpenTracker() {
  if (!activePageOpenTracker) return;
  window.removeEventListener("scroll", activePageOpenTracker.onScroll);
  activePageOpenTracker = null;
}

function getScrollCountThreshold(wordCount = PAGE_OPEN_COUNT_SCROLL_WORDS) {
  const rows = Array.from(document.querySelectorAll("#tableArea tr")).filter(row => !row.classList.contains("group-row"));
  if (rows.length > wordCount) {
    const targetRect = rows[wordCount].getBoundingClientRect();
    return Math.max(0, window.scrollY + targetRect.top - 8);
  }
  const firstCell = document.querySelector("#tableArea td, #tableArea .position-label");
  const wordHeight = firstCell ? Math.max(24, firstCell.getBoundingClientRect().height) : 36;
  return Math.min(document.documentElement.scrollHeight - window.innerHeight, wordCount * wordHeight);
}

function startPageOpenTracker(type) {
  stopPageOpenTracker();
  const target = getTableOpenCountTarget(type);
  activePageOpenTracker = {
    level: target.level,
    type: target.type,
    counted: false,
    threshold: getScrollCountThreshold(target.scrollWords),
    onScroll() {
      if (!activePageOpenTracker || activePageOpenTracker.counted) return;
      const maxScroll = Math.max(window.scrollY, document.documentElement.scrollTop || 0);
      if (maxScroll <= 0 || maxScroll < activePageOpenTracker.threshold) return;
      activePageOpenTracker.counted = true;
      incrementPageOpenCount(activePageOpenTracker.level, activePageOpenTracker.type);
      stopPageOpenTracker();
    }
  };
  window.addEventListener("scroll", activePageOpenTracker.onScroll, { passive: true });
  activePageOpenTracker.onScroll();
}

function setHomeMenu(menuName = "main") {
  currentHomeMenu = menuName;
  const title = document.getElementById("homeTitle");
  const actions = document.getElementById("homeActions");
  if (!title || !actions) return;

  if (menuName === "vocab") {
    title.innerHTML = `<span class="title-emoji left">🐢</span> 語彙 <span class="title-emoji right">🐢</span>`;
    actions.innerHTML = vocabCategories.map(category => `<button class="home-btn connect-btn" type="button" onclick="openVocabTable('${category}')">${category}</button>`).join("");
  } else {
    const menu = homeMenus[currentHomeLevel] || homeMenus[1];
    title.innerHTML = `<span class="title-emoji left">🐢</span> 日本語れんしゅう <span class="title-emoji right">🐢</span><span class="home-title-subtitle">（${menu.title}）</span>`;
    actions.innerHTML = menu.buttons.map(button => `<button class="home-btn ${button.className}" type="button" onclick="${button.action}">${button.label}${makeOpenCountBadge(currentHomeLevel, button.label)}</button>`).join("");
  }
  updateHomeNav();
  updateOpenCountBadges(actions);
}

function updateHomeNav() {
  const leftNav = document.getElementById("homeLeftNav");
  const rightNav = document.getElementById("homeRightNav");
  const leftLabel = document.getElementById("homeLeftLabel");
  const rightLabel = document.getElementById("homeRightLabel");
  if (!leftNav || !rightNav || !leftLabel || !rightLabel) return;

  const onVocab = currentHomeMenu === "vocab";
  leftNav.classList.toggle("disabled", onVocab || currentHomeLevel <= 0);
  const rightDisabled = onVocab || currentHomeLevel >= 1;
  rightNav.classList.toggle("disabled", rightDisabled);
  const rightButton = rightNav.querySelector(".page-arrow");
  if (rightButton) rightButton.setAttribute("aria-disabled", rightDisabled ? "true" : "false");
  leftLabel.textContent = onVocab ? "" : (currentHomeLevel === 1 ? "基礎" : "");
  rightLabel.textContent = onVocab ? "" : (currentHomeLevel === 0 ? "初級1" : "初級2");
}

function changeHomeLevel(direction) {
  const nextLevel = currentHomeLevel + direction;
  if (nextLevel < 0 || nextLevel > 1) return;
  currentHomeLevel = nextLevel;
  setHomeMenu("main");
  renderQuestionMemoLayer();
}

function openVocabMenu() {
  currentSection = "vocab";
  currentVocabCountLevel = currentHomeLevel;
  document.body.classList.remove("home-mode", "sheet-high", "table-start-lowered", "position-vocab");
  document.body.classList.add("menu-mode");
  document.getElementById("homeScreen").style.display = "none";
  document.getElementById("tableScreen").style.display = "none";
  document.getElementById("menuScreen").style.display = "block";
  document.getElementById("menuTitle").innerHTML = `<span class="title-emoji left">🐢</span> 語彙 <span class="title-emoji right">🐢</span>`;
  document.getElementById("menuButtonGrid").innerHTML = `<div class="menu-page active" data-page="0">${vocabCategories.map(category => `<button class="menu-btn" type="button" onclick="openVocabTable('${category}')">${category}</button>`).join("")}</div>`;
  document.getElementById("leftPageNav").style.display = "none";
  document.getElementById("rightPageNav").style.display = "none";
  requestAnimationFrame(renderQuestionMemoLayer);
  window.scrollTo(0, 0);
}

function openVocabTable(type) {
  currentSection = "vocab";
  showTable(type);
}

function isConjugationQuestionItem(item) {
  return item && !nonConjugationQuestionTypes.has(item.type);
}

function isCommonConjugationMemoItem(item) {
  return isConjugationQuestionItem(item) && !vocabCategories.includes(item.type);
}

function getHomeLevelForMemoItem(item) {
  if (!item) return null;
  if (Number.isInteger(item.homeLevel)) return item.homeLevel;
  if (vocabCategories.includes(item.type)) return 0;
  if (item.type === "つなぐ") return 1;
  return null;
}

function isHomeLevelMemoItem(item, level) {
  if (isCommonConjugationMemoItem(item)) return false;
  const itemLevel = getHomeLevelForMemoItem(item);
  if (itemLevel === null) return false;
  return itemLevel === level;
}

function makeVocabTable(type) {
  if (type === "位置詞") {
    makePositionVocabPractice();
    return;
  }
  const rows = vocabTableData[type] || [];
  let html = `<table class="listen-table vocab-table"><tr><th>ことば</th><th>読み方</th></tr>`;
  rows.forEach(row => {
    if (row && !Array.isArray(row) && row.tag) {
      html += `<tr class="group-row"><td colspan="2">${escapeHtml(row.tag)}</td></tr>`;
      return;
    }
    const [word, reading, special] = row;
    html += `<tr${special ? ' class="vocab-special"' : ''}><td>${makeWordCell(escapeHtml(word))}</td><td><span class="answer-text">${escapeHtml(reading)}</span></td></tr>`;
  });
  html += `</table><div class="scroll-extra-y"></div>`;
  document.getElementById("tableArea").innerHTML = html;
}

function makePositionVocabPractice() {
  document.body.classList.add("position-vocab");
  const labels = [
    ["机の前", "pos-front"],
    ["机の後ろ", "pos-back"],
    ["机の左", "pos-left"],
    ["机の右", "pos-right"],
    ["机の上", "pos-on"],
    ["机の下", "pos-under"],
    ["机の近く", "pos-near"],
    ["机の中", "pos-inside"]
  ];
  document.getElementById("tableArea").innerHTML = `
    <div class="position-practice" id="positionPractice">
      <div class="position-stage" id="positionStage" aria-label="位置詞の練習">
       ${labels.map(([text, cls]) => `<div class="position-label ${cls}">${escapeHtml(text)}</div>`).join("")}
        <div class="magnifier" id="positionMagnifier" role="button" aria-label="虫眼鏡を動かして文字を見る"></div>
      </div>
    </div>`;
  setupPositionMagnifier();
}

function setupPositionMagnifier() {
  const stage = document.getElementById("positionStage");
  const magnifier = document.getElementById("positionMagnifier");
  if (!stage || !magnifier) return;

  const revealLabels = () => {
    const magRect = magnifier.getBoundingClientRect();
    const magCenterX = magRect.left + magRect.width / 2;
    const magCenterY = magRect.top + magRect.height / 2;
    const radius = magRect.width * 0.58;
    stage.querySelectorAll(".position-label").forEach(label => {
      const rect = label.getBoundingClientRect();
      const labelCenterX = rect.left + rect.width / 2;
      const labelCenterY = rect.top + rect.height / 2;
      const distance = Math.hypot(magCenterX - labelCenterX, magCenterY - labelCenterY);
      label.classList.toggle("is-revealed", distance < radius + Math.min(rect.width, rect.height) / 2);
    });
  };

  const moveTo = (clientX, clientY) => {
    const stageRect = stage.getBoundingClientRect();
    const magRect = magnifier.getBoundingClientRect();
    const halfW = magRect.width / 2;
    const halfH = magRect.height / 2;
    const nextLeft = Math.max(0, Math.min(stageRect.width - magRect.width, clientX - stageRect.left - halfW));
    const nextTop = Math.max(0, Math.min(stageRect.height - magRect.height, clientY - stageRect.top - halfH));
    magnifier.style.left = `${nextLeft}px`;
    magnifier.style.top = `${nextTop}px`;
    revealLabels();
  };

  let dragging = false;
  magnifier.addEventListener("pointerdown", event => {
    dragging = true;
    magnifier.setPointerCapture(event.pointerId);
    magnifier.style.cursor = "grabbing";
    moveTo(event.clientX, event.clientY);
  });
  magnifier.addEventListener("pointermove", event => {
    if (!dragging) return;
    moveTo(event.clientX, event.clientY);
  });
  magnifier.addEventListener("pointerup", () => {
    dragging = false;
    magnifier.style.cursor = "grab";
  });
  magnifier.addEventListener("pointercancel", () => {
    dragging = false;
    magnifier.style.cursor = "grab";
  });
  revealLabels();
}


function escapeHtml(value) {
  return String(value).replace(/[&<>'"]/g, char => ({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[char]));
}

let currentMenuPage = 0;
const menuPageNames = ["基礎", "初級1", "初級2", "初中級"];

function updateMenuPage() {
  document.querySelectorAll(".menu-page").forEach((page, index) => {
    page.classList.toggle("active", index === currentMenuPage);
  });

  const leftNav = document.getElementById("leftPageNav");
  const rightNav = document.getElementById("rightPageNav");
  const leftLabel = document.getElementById("leftPageLabel");
  const rightLabel = document.getElementById("rightPageLabel");

  if (!leftNav || !rightNav || !leftLabel || !rightLabel) return;

  const hasPrev = currentMenuPage > 0;
  const hasNext = currentMenuPage < menuPageNames.length - 1;

  leftNav.classList.toggle("disabled", !hasPrev);
  rightNav.classList.toggle("disabled", !hasNext);

  leftLabel.textContent = hasPrev ? menuPageNames[currentMenuPage - 1] : "";
  rightLabel.textContent = hasNext ? menuPageNames[currentMenuPage + 1] : "";
}

function changeMenuPage(direction) {
  const nextPage = currentMenuPage + direction;
  if (nextPage < 0 || nextPage >= menuPageNames.length) return;
  currentMenuPage = nextPage;
  updateMenuPage();
  renderQuestionMemoLayer();
  window.scrollTo(0, 0);
}

const QUESTION_STORAGE_KEY = "katsuyouQuestionMarks_v1";
const QUESTION_STORAGE_CACHE_KEY = "katsuyouQuestionMarks_cache_v1";
const QUESTION_STORAGE_MIRROR_KEY = "katsuyouQuestionMarks_mirror_v2";
const QUESTION_SESSION_STORAGE_KEY = "katsuyouQuestionMarks_session_v1";
const QUESTION_STORAGE_PREFIX = "katsuyouQuestionMarks";
const QUESTION_IDB_NAME = "katsuyouQuestionMarksDb";
const QUESTION_IDB_STORE = "questionMarks";
const QUESTION_IDB_RECORD_KEY = "activeMarks";
const QUESTION_IDB_VERSION = 1;
const QUESTION_MEMO_DISPLAY_LIMIT = 12;
const QUESTION_MEMO_ZONE_LIMIT = 6;
const QUESTION_ROW_KEY_PREFIX = "row";
let currentTableType = "";
let questionStoreMemory = [];
let questionStoreLastJson = "[]";
let questionIndexedDbPromise = null;
let questionIndexedDbHydrated = false;
let questionIndexedDbPendingJson = null;

function isValidQuestionItem(item) {
  if (!item || typeof item !== "object") return false;
  if (typeof item.key !== "string" || !item.key.trim()) return false;

  const leftText = item.leftText || stripHtmlForKey(item.leftHtml || "");
  const rightText = item.rightText || stripHtmlForKey(item.rightHtml || "");
  return !!(leftText && rightText);
}

function sanitizeQuestionMemoHtml(html) {
  const tmp = document.createElement("div");
  tmp.innerHTML = html || "";

  // 表の赤シート用カバーやインライン調整だけを？記録へ持ち込まない。
  // 絵文字や「つなぐ」の四角アイコンは class で描画しているため、class は残して完全に再現する。
  tmp.querySelectorAll(".answer-mask-cover").forEach(el => el.remove());
  tmp.querySelectorAll("[style]").forEach(el => {
    el.removeAttribute("style");
  });

  return tmp.innerHTML.trim();
}

function normalizeQuestionItem(item) {
  const leftHtml = sanitizeQuestionMemoHtml(item.leftHtml || item.leftText || "");
  const rightHtml = sanitizeQuestionMemoHtml(item.rightHtml || item.rightText || "");
  const leftText = item.leftText || stripHtmlForKey(leftHtml);
  const rightText = item.rightText || stripHtmlForKey(rightHtml);
  const type = item.type || "";
  const key = item.key || `${type}::${leftText}::${rightText}`;
  const legacyKey = item.legacyKey || `${type}::${leftText}::${rightText}`;
  const homeLevel = Number.isInteger(item.homeLevel) ? item.homeLevel : null;
  return { key, legacyKey, type, homeLevel, leftHtml, rightHtml, leftText, rightText };
}

function parseQuestionStoreValue(raw) {
  try {
    const parsed = raw ? JSON.parse(raw) : [];
    return Array.isArray(parsed) ? parsed : [];
  } catch (e) {
    return [];
  }
}

function getBrowserStorage(name) {
  try {
    return window[name] || null;
  } catch (e) {
    return null;
  }
}

function readStorageValue(storage, key) {
  try {
    return storage ? storage.getItem(key) : null;
  } catch (e) {
    return null;
  }
}

function writeStorageValue(storage, key, value) {
  try {
    if (storage) storage.setItem(key, value);
  } catch (e) {
    // 容量不足・プライベートモードなどで書けない場合は、他の保存先とメモリで守る。
  }
}

function getQuestionStoreRawLists() {
  const lists = [];

  // まず画面を開いている間のメモリを入れる。ブラウザ保存が一時的に読めない時でも、
  // safeParseQuestionStore() が空データで上書きしてしまう事故を防ぐ。
  lists.push(questionStoreMemory);

  const primaryKeys = [
    QUESTION_STORAGE_KEY,
    QUESTION_STORAGE_CACHE_KEY,
    QUESTION_STORAGE_MIRROR_KEY
  ];

  primaryKeys.forEach(key => {
    lists.push(parseQuestionStoreValue(readStorageValue(getBrowserStorage("localStorage"), key)));
  });
  lists.push(parseQuestionStoreValue(readStorageValue(getBrowserStorage("sessionStorage"), QUESTION_SESSION_STORAGE_KEY)));

  try {
    // コードを書き替えた時に保存キーの名前が変わっても、同じ接頭辞の古い？記録を拾って復元する。
    // 古いキーは消さずに残し、万一メイン保存が消えた時の避難用バックアップとして使う。
    const local = getBrowserStorage("localStorage");
    if (!local) return lists;
    for (let i = 0; i < local.length; i++) {
      const key = local.key(i);
      if (!key || !key.startsWith(QUESTION_STORAGE_PREFIX)) continue;
      if (primaryKeys.includes(key)) continue;
      lists.push(parseQuestionStoreValue(local.getItem(key)));
    }
  } catch (e) {
    return lists;
  }
  return lists;
}

function cleanQuestionStoreItems(rawLists) {
  const cleaned = [];
  const usedKeys = new Set();

  rawLists.forEach(list => {
    if (!Array.isArray(list)) return;
    list.forEach(item => {
      if (!item || typeof item !== "object") return;
      const normalized = normalizeQuestionItem(item);
      if (!isValidQuestionItem(normalized)) return;

      // 表の行番号キーと、昔の「文字内容キー」のどちらかが同じなら同じ？記録として扱う。
      const aliases = [normalized.key, normalized.legacyKey].filter(Boolean);
      if (aliases.some(alias => usedKeys.has(alias))) return;
      aliases.forEach(alias => usedKeys.add(alias));
      cleaned.push(normalized);
    });
  });

  return cleaned;
}

function safeParseQuestionStore() {
  const cleaned = cleanQuestionStoreItems(getQuestionStoreRawLists());

  // 読み取れた内容は、localStorage / sessionStorage / IndexedDB / メモリへ毎回ミラーする。
  // どれか1つの保存先が消えても、残った保存先から次回また復元できるようにする。
  saveQuestionStore(cleaned);
  return cleaned;
}

function saveQuestionStore(items) {
  const cleaned = Array.isArray(items)
    ? cleanQuestionStoreItems([items])
    : [];
  const serialized = JSON.stringify(cleaned);

  questionStoreMemory = cleaned;
  questionStoreLastJson = serialized;

  writeStorageValue(getBrowserStorage("localStorage"), QUESTION_STORAGE_KEY, serialized);
  writeStorageValue(getBrowserStorage("localStorage"), QUESTION_STORAGE_CACHE_KEY, serialized);
  writeStorageValue(getBrowserStorage("localStorage"), QUESTION_STORAGE_MIRROR_KEY, serialized);
  writeStorageValue(getBrowserStorage("sessionStorage"), QUESTION_SESSION_STORAGE_KEY, serialized);
  saveQuestionStoreToIndexedDb(serialized);
}

function openQuestionStoreIndexedDb() {
  if (!window.indexedDB) return Promise.resolve(null);
  if (questionIndexedDbPromise) return questionIndexedDbPromise;

  questionIndexedDbPromise = new Promise(resolve => {
    const request = indexedDB.open(QUESTION_IDB_NAME, QUESTION_IDB_VERSION);

    request.onupgradeneeded = () => {
      const db = request.result;
      if (!db.objectStoreNames.contains(QUESTION_IDB_STORE)) {
        db.createObjectStore(QUESTION_IDB_STORE);
      }
    };

    request.onsuccess = () => resolve(request.result);
    request.onerror = () => resolve(null);
    request.onblocked = () => resolve(null);
  });

  return questionIndexedDbPromise;
}

function readQuestionStoreFromIndexedDb() {
  return openQuestionStoreIndexedDb().then(db => new Promise(resolve => {
    if (!db) {
      resolve([]);
      return;
    }

    try {
      const tx = db.transaction(QUESTION_IDB_STORE, "readonly");
      const store = tx.objectStore(QUESTION_IDB_STORE);
      const request = store.get(QUESTION_IDB_RECORD_KEY);
      request.onsuccess = () => resolve(parseQuestionStoreValue(request.result));
      request.onerror = () => resolve([]);
    } catch (e) {
      resolve([]);
    }
  }));
}

function saveQuestionStoreToIndexedDb(serialized) {
  const value = serialized || questionStoreLastJson;

  if (!questionIndexedDbHydrated) {
    questionIndexedDbPendingJson = value;
    return;
  }

  openQuestionStoreIndexedDb().then(db => {
    if (!db) return;

    try {
      const tx = db.transaction(QUESTION_IDB_STORE, "readwrite");
      tx.objectStore(QUESTION_IDB_STORE).put(value, QUESTION_IDB_RECORD_KEY);
    } catch (e) {
      // IndexedDB が一時的に使えない場合でも、同期保存先には保存済み。
    }
  });
}

function requestPersistentBrowserStorage() {
  if (!navigator.storage || !navigator.storage.persist) return;

  navigator.storage.persisted()
    .then(isPersisted => isPersisted || navigator.storage.persist())
    .catch(() => false);
}

function bootstrapQuestionStorePersistence() {
  requestPersistentBrowserStorage();

  readQuestionStoreFromIndexedDb().then(indexedDbItems => {
    const pendingItems = parseQuestionStoreValue(questionIndexedDbPendingJson);
    questionIndexedDbHydrated = true;
    const merged = cleanQuestionStoreItems([safeParseQuestionStore(), indexedDbItems, pendingItems]);
    questionIndexedDbPendingJson = null;
    saveQuestionStore(merged);
    restoreQuestionMarks();
    renderQuestionMemoLayer();
  });
}

function flushQuestionStoreBeforeHide() {
  // iOS/Safariなどでタブが急に破棄される前に、最後の状態を同期保存へもう一度書く。
  const items = cleanQuestionStoreItems([questionStoreMemory]);
  const serialized = JSON.stringify(items);
  writeStorageValue(getBrowserStorage("localStorage"), QUESTION_STORAGE_KEY, serialized);
  writeStorageValue(getBrowserStorage("localStorage"), QUESTION_STORAGE_CACHE_KEY, serialized);
  writeStorageValue(getBrowserStorage("localStorage"), QUESTION_STORAGE_MIRROR_KEY, serialized);
  writeStorageValue(getBrowserStorage("sessionStorage"), QUESTION_SESSION_STORAGE_KEY, serialized);
  saveQuestionStoreToIndexedDb(serialized);
}

function removeLegacyQuestionStoreKeys() {
  // 以前は古い保存キーを削除していたが、保存が消えた時の復元元になるため残す。
}

function stripHtmlForKey(html) {
  const tmp = document.createElement("div");
  tmp.innerHTML = html || "";
  return (tmp.textContent || "").replace(/\s+/g, "").trim();
}

function getQuestionRowIndex(row) {
  if (!row) return -1;
  const rows = Array.from(document.querySelectorAll("#tableArea tr"))
    .filter(candidate => candidate.querySelector(".question-box"));
  return rows.indexOf(row);
}

function makeStableQuestionKey(type, rowIndex) {
  return `${type}::${QUESTION_ROW_KEY_PREFIX}:${rowIndex}`;
}

function getQuestionInfo(button) {
  const row = button.closest("tr");
  if (!row) return null;
  const cells = row.querySelectorAll("td");
  if (cells.length < 2) return null;

  const leftEl = cells[0].querySelector(".word-text") || cells[0];
  const rightEl = cells[1].querySelector(".answer-text") || cells[1];
  const leftHtml = sanitizeQuestionMemoHtml((leftEl.innerHTML || "").trim());
  const rightHtml = sanitizeQuestionMemoHtml((rightEl.innerHTML || "").trim());
  const leftText = stripHtmlForKey(leftHtml);
  const rightText = stripHtmlForKey(rightHtml);
  if (!leftText || !rightText) return null;

  const type = currentTableType || document.getElementById("tableTitle")?.textContent || "";
  const rowIndex = getQuestionRowIndex(row);
  const homeLevel = currentSection === "listen" || currentSection === "speak" || currentSection === "connect" || currentSection === "vocab" ? currentHomeLevel : null;
  const legacyKey = `${type}::${leftText}::${rightText}`;
  const stableKeyBase = rowIndex >= 0 ? makeStableQuestionKey(type, rowIndex) : legacyKey;
  const stableKey = homeLevel === null ? stableKeyBase : `${type}::level:${homeLevel}::${rowIndex >= 0 ? `${QUESTION_ROW_KEY_PREFIX}:${rowIndex}` : `${leftText}::${rightText}`}`;
  const key = tableRandomized && button.dataset.questionKey ? button.dataset.questionKey : stableKey;
  return { key, legacyKey, type, homeLevel, rowIndex, leftHtml, rightHtml, leftText, rightText };
}

function questionItemMatchesInfo(item, info) {
  if (!item || !info) return false;
  const itemHasLevel = Number.isInteger(item.homeLevel);
  const infoHasLevel = Number.isInteger(info.homeLevel);
  const sameLevel = !itemHasLevel || !infoHasLevel || item.homeLevel === info.homeLevel;
  if (!sameLevel) return false;
  return item.key === info.key || item.key === info.legacyKey || item.legacyKey === info.key || item.legacyKey === info.legacyKey;
}

function restoreQuestionMarks() {

    const isSaved = savedIndex >= 0;
    button.dataset.questionKey = info.key;
    button.dataset.legacyQuestionKey = info.legacyKey;
    button.classList.toggle("active", isSaved);

    if (isSaved && (items[savedIndex].key !== info.key || items[savedIndex].legacyKey !== info.legacyKey)) {
      items[savedIndex] = normalizeQuestionItem(info);
      changed = true;
    }
  });

  if (changed) {
    saveQuestionStore(items);
    renderQuestionMemoLayer();
  }
}

function memoRectsOverlap(a, b, gap = 8) {
  return !(a.right + gap < b.left || a.left - gap > b.right || a.bottom + gap < b.top || a.top - gap > b.bottom);
}

function getForbiddenMemoRects() {
  const selectors = [".button-grid", ".page-title", ".page-nav:not(.disabled)", ".start-notice-overlay"];
  return selectors.flatMap(selector => Array.from(document.querySelectorAll(selector)))
    .filter(el => el && el.offsetParent !== null && getComputedStyle(el).display !== "none")
    .map(el => {
      const r = el.getBoundingClientRect();
      return { left: r.left - 8, top: r.top - 8, right: r.right + 8, bottom: r.bottom + 8 };
    });
}

function seededRandom(seed) {
  let h = 2166136261;
  for (let i = 0; i < seed.length; i++) {
    h ^= seed.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return function() {
    h += 0x6D2B79F5;
    let t = h;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}


function typeNeedsFocusOnly(type, leftText) {
  const t = type || "";
  if (leftText && (leftText.includes("・") || leftText.includes("、"))) return false;
  return [
    "Vませんか", "Vましょう", "Vてもいいですか", "Vてください",
    "Vないでください", "Vています", "Vてきます", "Vたことがあります", "Vたことがありますか", "形-なる"
  ].some(name => t === name || t.includes(name));
}

function extractLastCoreHtml(html) {
  const source = (html || "").trim();
  if (!source) return "";

  const lastRuby = source.lastIndexOf("<ruby");
  if (lastRuby >= 0) {
    return source.slice(lastRuby).replace(/^[\s　]+|[\s　]+$/g, "");
  }

  const text = stripHtmlForKey(source);
  const m = text.match(/[ぁ-んァ-ン一-龥々ー]+(?:する|します|した|して|できる|できます|ないでください|てください|ています|てきます|ませんか|ましょう|たいです|たことがありますか|たことがあります|てもいいですか|ない|ます|ました|かったです|くないです|くなかったです|くなります|になります|です)?$/);
  return m ? m[0] : source;
}

function extractTaraLeftHtml(html) {
  const firstPart = String(html || "").split("・")[0];
  return extractLastCoreHtml(firstPart);
}

function extractTaraRightHtml(html) {
  const source = String(html || "").trim();
  const marker = "たら、";
  const markerIndex = source.indexOf(marker);
  const prefix = markerIndex >= 0 ? source.slice(0, markerIndex + marker.length) : source;
  const lastRuby = prefix.lastIndexOf("<ruby");

  if (lastRuby >= 0) {
    return prefix.slice(lastRuby).replace(/^[\s　]+|[\s　]+$/g, "");
  }

  const text = stripHtmlForKey(prefix.replace(/、?$/, "、"));
  const particleIndexes = ["が", "を", "へ", "に", "で"].map(particle => text.lastIndexOf(particle));
  const lastParticleIndex = Math.max(...particleIndexes);
  if (lastParticleIndex >= 0) {
    return text.slice(lastParticleIndex + 1);
  }

  const match = text.match(/[^、・\s　]+たら、$/);
  return match ? match[0] : prefix;
}

function isTariMemoType(type) {

function isNonConjugationMemoType(type) {

}

function isTaraMemoType(type) {
  return type === "Vたら" || type === "たら";

function isStackedMemoType(type) {

}


function inlineBeforeAfterMemoHtml(html) {
  const tmp = document.createElement("div");
  tmp.innerHTML = html || "";
  const marker = tmp.querySelector(".connect-separator-before-after");
  if (!marker) return html || "";

  const lines = Array.from(tmp.querySelectorAll(".tara-hint-line"));
  if (lines.length < 2) return html || "";

  const firstLine = lines[0].cloneNode(true);
  const markerInFirstLine = firstLine.querySelector(".connect-separator-before-after");
  if (markerInFirstLine) markerInFirstLine.remove();

  const beforeAfterIcon = marker.outerHTML;
  const firstText = firstLine.innerHTML.trim();
  const secondText = lines.slice(1).map(line => line.innerHTML.trim()).join("");
  return `${beforeAfterIcon}${firstText}・${secondText}`;
}

function inlineTaraHintMemoHtml(html) {
  const tmp = document.createElement("div");
  tmp.innerHTML = html || "";
  const lines = Array.from(tmp.querySelectorAll(".tara-hint-line"));
  if (!lines.length) return html || "";
  const lineHtml = lines.map(line => line.innerHTML.trim());
  const inlined = lineHtml.join("").replace(/^💭/, "");
  if (inlined.includes("connect-separator-tara")) return inlined;

  const firstLine = (lineHtml[0] || "").replace(/^💭/, "");
  const restLines = lineHtml.slice(1).join("");
  return `${firstLine}${makeConnectSeparator("～たら")}${restLines}`;
}

function getMemoDisplayItem(item) {
  const type = item.type || "";
  const leftText = item.leftText || stripHtmlForKey(item.leftHtml || "");
  const rightText = item.rightText || stripHtmlForKey(item.rightHtml || "");
  let leftHtml = item.leftHtml || "";
  let rightHtml = item.rightHtml || "";

  if (type === "Vたら" || type === "たら") {
    leftHtml = inlineTaraHintMemoHtml(leftHtml);
  } else if (type === "つなぐ" && leftHtml.includes("connect-separator-before-after")) {
    leftHtml = inlineBeforeAfterMemoHtml(leftHtml);
  } else if (typeNeedsFocusOnly(type, leftText)) {
    leftHtml = extractLastCoreHtml(leftHtml);
    rightHtml = extractLastCoreHtml(rightHtml);
  }

  if (type === "つなぐ" && rightText.includes("から")) {
    rightHtml = shouldAnnotateReasonKara(rightText) ? addReasonKaraNote(rightHtml) : removeReasonKaraNote(rightHtml);
  }

  return { type, leftHtml, rightHtml, leftText, rightText };
}

function getMemoMeasureText(html, fallbackText) {
  const tmp = document.createElement("div");
  tmp.innerHTML = html || "";
  tmp.querySelectorAll("rt").forEach(rt => rt.remove());
  return (tmp.textContent || fallbackText || "").replace(/\s+/g, "").trim();
}

function getMemoTextWidth(item, isSmall, fontBump = 0) {
  const displayItem = getMemoDisplayItem(item);
  const leftText = getMemoMeasureText(displayItem.leftHtml, displayItem.leftText);
  const rightText = getMemoMeasureText(displayItem.rightHtml, displayItem.rightText);
  const fontSize = (isSmall ? 8 : 12) + fontBump;
  const horizontalPadding = 2;
  const font = `700 ${fontSize}px "Hiragino Maru Gothic ProN", "Yu Gothic", sans-serif`;

  if (!getMemoTextWidth.canvas) {
    getMemoTextWidth.canvas = document.createElement("canvas");
  }

  const ctx = getMemoTextWidth.canvas.getContext("2d");
  if (!ctx) {
    const leftLength = Array.from(`${leftText}→`).length;
    const rightLength = Array.from(rightText).length;
    const length = isStackedMemoType(displayItem.type) ? Math.max(leftLength, rightLength) : leftLength + rightLength;
    return Math.ceil(length * fontSize + horizontalPadding);
  }

  ctx.font = font;
  const leftWidth = ctx.measureText(leftText).width;
  const arrowWidth = ctx.measureText("→").width;
  const rightWidth = ctx.measureText(rightText).width;
  const textWidth = isStackedMemoType(displayItem.type)
    ? Math.max(leftWidth + arrowWidth, rightWidth)
    : leftWidth + arrowWidth + rightWidth;
  return Math.ceil(textWidth + horizontalPadding);
}

function arrangeMemoRow(rowItems) {
  if (rowItems.length <= 2) {
    return rowItems.slice().sort((a, b) => b.width - a.width);
  }

  const sorted = rowItems.slice().sort((a, b) => b.width - a.width);
  const smallFirst = sorted.slice(1).sort((a, b) => a.width - b.width);

  if (sorted[0].isWide && sorted[1]?.isWide && !sorted[2]?.isWide) {
    return [sorted[0], sorted[2], sorted[1]];
  }

  return [smallFirst[0], sorted[0], smallFirst[1]];
}

function getMemoLayout(items, options = {}) {
  items = Array.isArray(items) ? items.filter(isValidQuestionItem) : [];
  if (!items.length) return [];
  const displayLimit = options.displayLimit || QUESTION_MEMO_DISPLAY_LIMIT;
  const zoneLimit = options.zoneLimit || QUESTION_MEMO_ZONE_LIMIT;
  if (items.length > displayLimit) return null;

  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const isSmall = vw <= 420;
  const margin = isSmall ? 5 : 8;
  const gap = isSmall ? 4 : 6;
  const columns = options.columns || 2;
  const rowsPerZone = Math.ceil(zoneLimit / columns);
  const baseCardW = Math.floor((vw - margin * 2 - gap * (columns - 1)) / columns);
  // 横長カードを行いっぱいに広げると、隣の？記録の上に白いカード背景が被るため、
  // 各カードは自分の列幅内に収め、文字側を縮小して見切れを防ぐ。
  const maxCardW = baseCardW;
  const cardH = isSmall ? 54 : 66;
  const title = document.querySelector(".page-title");
  const titleRect = title ? title.getBoundingClientRect() : null;
  const zoneOuterGap = isSmall ? 10 : 14;
  const topY = titleRect ? Math.max(margin + zoneOuterGap, Math.ceil(titleRect.bottom + zoneOuterGap)) : margin + zoneOuterGap;
  const bottomY = Math.max(margin + zoneOuterGap, vh - margin - zoneOuterGap - rowsPerZone * cardH - (rowsPerZone - 1) * gap);
  const layoutItems = items.map((item, index) => {
    const textWidth = getMemoTextWidth(item, isSmall);
    const roomyTextWidth = getMemoTextWidth(item, isSmall, 3);
    const isRoomy = roomyTextWidth <= baseCardW;
    const width = Math.min(maxCardW, Math.max(baseCardW, textWidth));

    return {
      itemIndex: index,
      width,
      height: cardH,
      isWide: width > baseCardW + 1,
      isRoomy,
      rotation: Math.random() < 0.5 ? -1 : 1
    };
  });

  const positions = [];
  const placeLayoutItem = (layoutItem, col, row, yBase) => {
    const columnWidth = (vw - margin * 2 - gap * (columns - 1)) / columns;
    const x = margin + col * (columnWidth + gap);

    positions.push({
      itemIndex: layoutItem.itemIndex,
      x: Math.max(margin, Math.min(x, vw - margin - layoutItem.width)),
      y: yBase + row * (cardH + gap),
      width: layoutItem.width,
      height: layoutItem.height,
      layer: layoutItem.width,
      isRoomy: layoutItem.isRoomy,
      rotation: layoutItem.rotation
    });
  };

  const placeZone = (zoneItems, yBase) => {
    zoneItems.forEach((layoutItem, index) => {
      const row = Math.floor(index / columns);
      const col = index % columns;
      placeLayoutItem(layoutItem, col, row, yBase);
    });
  };

  placeZone(layoutItems.slice(0, zoneLimit), topY);
  placeZone(layoutItems.slice(zoneLimit), bottomY);

  return positions;
}

function escapeForAttr(value) {
  return String(value || "").replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function getRandomQuestionMemoItems(items, limit) {
  const list = Array.isArray(items) ? items.slice() : [];

  for (let i = list.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [list[i], list[j]] = [list[j], list[i]];
  }

  return list.slice(0, limit);
}

function renderQuestionMemoLayer() {
  const isMenuMemo = currentSection === "conjugation" || currentSection === "vocab";
  const memoLimit = isMenuMemo ? MENU_MEMO_DISPLAY_LIMIT : TOP_MEMO_DISPLAY_LIMIT;
  const screen = document.getElementById(isMenuMemo ? "menuScreen" : "homeScreen");
  const layer = document.getElementById(isMenuMemo ? "questionMemoLayer" : "homeQuestionMemoLayer");
  if (!layer || !screen || screen.style.display === "none") return;

  const allItems = safeParseQuestionStore();
  let items;
  if (currentSection === "vocab") {
    items = getRandomQuestionMemoItems(allItems.filter(item => vocabCategories.includes(item.type)), memoLimit);
  } else if (isMenuMemo) {
    items = getRandomQuestionMemoItems(allItems.filter(isCommonConjugationMemoItem), memoLimit);
  } else {
    const levelSpecificLimit = Math.round(memoLimit * 0.7);
    const conjugationLimit = memoLimit - levelSpecificLimit;
    const levelSpecificSource = allItems.filter(item => isHomeLevelMemoItem(item, currentHomeLevel));
    const conjugationSource = allItems.filter(isCommonConjugationMemoItem);
    const levelSpecificItems = getRandomQuestionMemoItems(levelSpecificSource, levelSpecificLimit);
    const conjugationItems = getRandomQuestionMemoItems(conjugationSource, conjugationLimit);
    const selectedItems = [...levelSpecificItems, ...conjugationItems];
    const selectedKeys = new Set(selectedItems.map(item => item.key));
    const fillLimit = memoLimit - selectedItems.length;
    const fillSource = [
      ...levelSpecificSource.filter(item => !selectedKeys.has(item.key)),
      ...conjugationSource.filter(item => !selectedKeys.has(item.key))
    ];
    const fillItems = fillLimit > 0 ? getRandomQuestionMemoItems(fillSource, fillLimit) : [];
    items = [...selectedItems, ...fillItems];
  }
  layer.innerHTML = "";
  if (!items.length) return;

  const positions = getMemoLayout(items, isMenuMemo ? { displayLimit: MENU_MEMO_DISPLAY_LIMIT, zoneLimit: 6, columns: 3 } : { displayLimit: TOP_MEMO_DISPLAY_LIMIT, zoneLimit: 4, columns: 2 });
  if (!positions) {
    // 画面サイズ変更などで全部は置けない場合でも、保存データは壊さない。
    // 次に？を押した時に「0個扱い」にならないよう、ここではトーストも出さない。
    return;
  }

  positions.forEach(pos => {
    const item = items[pos.itemIndex];
    const displayItem = getMemoDisplayItem(item);
    const card = document.createElement("div");
    const isStackedMemo = isStackedMemoType(displayItem.type);
    const isTaraMemo = isTaraMemoType(displayItem.type);
    card.className = `question-memo-card${pos.isRoomy ? " memo-roomy" : ""}${isStackedMemo ? " memo-stacked" : ""}${isTaraMemo ? " memo-tara" : ""}${displayItem.rightHtml.includes("reason-kara-note") ? " memo-has-reason-note" : ""}`;
    card.style.left = `${pos.x}px`;
    card.style.top = `${pos.y}px`;
    card.style.width = `${pos.width}px`;
    card.style.minHeight = `${pos.height}px`;
    card.style.zIndex = String(Math.round(pos.layer));
    card.style.setProperty("--memo-rotation", `rotate(${pos.rotation}deg)`);
    card.setAttribute("role", "button");
    card.setAttribute("tabindex", "0");
    card.dataset.type = item.type;
    card.dataset.key = item.key;
    card.innerHTML = isStackedMemo ? `
      <span class="memo-pair memo-pair-stacked">
        <span class="memo-top-line">
          <span class="memo-left">${displayItem.leftHtml || ""}</span>
          <span class="memo-arrow">→</span>
        </span>
        <span class="memo-right">${displayItem.rightHtml || ""}</span>
      </span>
    ` : `
      <span class="memo-pair">
        <span class="memo-left">${displayItem.leftHtml || ""}</span>
        <span class="memo-arrow">→</span>
        <span class="memo-right">${displayItem.rightHtml || ""}</span>
      </span>
    `;
    const openMemo = () => showTable(card.dataset.type || item.type, card.dataset.key || item.key);
    card.addEventListener("click", openMemo);
    card.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        openMemo();
      }
    });
    layer.appendChild(card);
  });

  fitMemoCardText();
}

function formatListenPrompt(prompt) {
  const value = String(prompt || "");
  const separatorIndex = value.lastIndexOf(" ");
  if (separatorIndex < 0) return escapeHtml(value);

  const text = value.slice(0, separatorIndex);
  const emoji = value.slice(separatorIndex + 1);
  return `
    <span class="listen-prompt">
      <span class="listen-prompt-text">${escapeHtml(text)}</span>
      <br class="listen-prompt-break">
      <span class="listen-prompt-emoji">${formatListenPromptEmoji(emoji)}</span>
    </span>
  `;
}

function formatListenPromptEmoji(emoji) {
  if (emoji === "🚶‍♂️❔") {
    return `
      <span class="listen-prompt-direction">
        <span class="listen-prompt-walker-reversed">🚶‍♂️</span>
        <span class="listen-prompt-arrow-question" aria-label="？長い矢印">
          <span class="listen-prompt-arrow-question-mark">？</span>
          <span class="listen-prompt-long-arrow">⟶</span>
        </span>
      </span>
    `;
  }

  const labelTexts = ["日本語", "意味"];
  const chars = Array.from(String(emoji || ""));
  const parts = [];

  for (let i = 0; i < chars.length; i += 1) {
    const label = labelTexts.find(text => chars.slice(i, i + Array.from(text).length).join("") === text);
    if (label) {
      parts.push(`<span class="listen-prompt-label">${escapeHtml(label)}</span>`);
      i += Array.from(label).length - 1;
      continue;
    }

    const char = chars[i];
    if (char === "👀") {
      parts.push(`<span class="listen-prompt-eye">${escapeHtml(char)}</span>`);
      continue;
    }

    if (char === "❔") {
      parts.push(`<span class="listen-prompt-question">？</span>`);
      continue;
    }

    parts.push(escapeHtml(char));
  }

  return parts.join("");
}

const rubyTextPattern = new RegExp(Object.keys(rubyTextMap)
  .sort((a, b) => b.length - a.length)
  .map(text => text.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"))
  .join("|"), "g");

function addFurigana(html) {
  return String(html || "").replace(rubyTextPattern, text => rubyTextMap[text] || text);
}

function makeTwoLineHint(hint, showThoughtBubble = false) {
  const compactHint = compactJapanese(hint);
  const separatorIndex = compactHint.indexOf("・");
  if (separatorIndex < 0) return compactHint;

  const firstPart = compactHint.slice(0, separatorIndex);
  const firstLine = showThoughtBubble
    ? `💭${firstPart}`
    : `${firstPart}${makeConnectSeparator("～たら")}`;
  const secondLine = compactHint.slice(separatorIndex + 1);
  return `
    <span class="tara-hint-line">${firstLine}</span>
    <span class="tara-hint-line">${secondLine}</span>
  `;
}

function makeConnectSeparator(groupTitle, rowIndex = 0) {
  if (groupTitle === "くて" || groupTitle === "～て") return `<span class="connect-separator connect-separator-plus">+</span>`;
  if (groupTitle === "Vて、感情" || groupTitle === "Vて") return `<span class="connect-separator connect-separator-square connect-separator-fast connect-separator-soft-blue"><span>▶</span><span>▶</span></span>`;
  if (groupTitle === "～で") return `<span class="connect-separator connect-separator-square connect-separator-fast"><span>▶</span><span>▶</span></span>`;
  if (groupTitle === "～けど・ですが" || groupTitle === "ですけど・ですが") return `<span class="connect-separator connect-separator-square connect-separator-contrast"><span class="bidi-arrow"><span class="bidi-arrow-left"></span><span class="bidi-arrow-right"></span></span></span>`;
  if (groupTitle === "Vて（順序）" || groupTitle === "➡") return `<span class="connect-separator connect-separator-bold-arrow">➡</span>`;
  if (groupTitle === "～ので（理由）" || groupTitle === "理由") return `<span class="connect-separator connect-separator-square connect-separator-fast connect-separator-soft-blue"><span>▶</span><span>▶</span></span>`;
  if (groupTitle === "～前に・～てから" || groupTitle === "前に・てから") {
    const isBefore = rowIndex < 2;
    return `<span class="connect-separator connect-separator-before-after ${isBefore ? "is-before" : "is-after"}"><span class="connect-separator-before-after-label">${isBefore ? "before" : "after"}</span></span>`;
  }
  if (groupTitle === "～ても（就算）" || groupTitle === "就算（～ても）") return `<span class="connect-separator connect-separator-square connect-separator-temo"><span class="temo-arrow-stem"></span><span class="temo-arrow-head"></span><span class="temo-bang"></span></span>`;
  if (groupTitle === "～とき" || groupTitle === "🕐") {
    const isRuTime = rowIndex < 3;
    return `<span class="connect-separator connect-separator-time ${isRuTime ? "is-ru-time" : "is-ta-time"}">${isRuTime ? "🕐" : "🕣"}</span>`;
  }
  if (groupTitle === "～たら") return `<span class="connect-separator connect-separator-square connect-separator-tara"><span class="tara-arrow-stem"></span><span class="tara-arrow-head"></span></span>`;
  return `<span class="connect-separator">・</span>`;
}

function makeConnectHint(prompt, groupTitle, rowIndex) {
  const compactHint = compactJapanese(escapeHtml(prompt));
  const separatorText = compactHint.includes("・") ? "・" : "↔";
  const separatorIndex = compactHint.indexOf(separatorText);
  if (separatorIndex < 0) return compactHint;

  const addThought = groupTitle === "～たら" && rowIndex > 4;
  const separator = addThought ? "" : makeConnectSeparator(groupTitle, rowIndex);
  const firstPart = compactHint.slice(0, separatorIndex);
  const firstLine = (groupTitle === "～前に・～てから" || groupTitle === "前に・てから")
    ? `${separator}${firstPart}`
    : `${addThought ? "💭" : ""}${firstPart}${separator}`;
  const secondLine = compactHint.slice(separatorIndex + separatorText.length);
  return `
    <span class="tara-hint-line">${firstLine}</span>
    <span class="tara-hint-line">${secondLine}</span>
  `;
}

function removeReasonKaraNote(html) {
  const tmp = document.createElement("div");
  tmp.innerHTML = html || "";
  tmp.querySelectorAll(".reason-kara-wrap").forEach(wrap => {
    wrap.replaceWith(document.createTextNode(wrap.childNodes[0]?.textContent || "から"));
  });
  return tmp.innerHTML;
}

function shouldAnnotateReasonKara(text) {
  const source = String(text || "");
  const index = source.indexOf("から");
  if (index < 0) return false;
  const previousChar = source[index - 1] || "";
  return previousChar !== "て" && previousChar !== "で";
}

function addReasonKaraNote(html) {
  const source = String(html || "");
  const text = stripHtmlForKey(source);
  if (!shouldAnnotateReasonKara(text)) return removeReasonKaraNote(source);

  const karaIndex = source.indexOf("から");
  if (karaIndex < 0) return source;
  return `${source.slice(0, karaIndex)}<span class="reason-kara-wrap">から<span class="reason-kara-note">（ので）</span></span>${source.slice(karaIndex + "から".length)}`;
}

function makeConnectTable() {
  let html = `
    <table class="listen-table tara-table connect-table">
      <tr><th>ヒント</th><th>日本語</th></tr>
  `;

  connectPracticeData.forEach(group => {
    html += `
      <tr class="group-row">
        <td colspan="2">${group.title}</td>
      </tr>
    `;

    group.rows.forEach(([prompt, answer], rowIndex) => {
      const answerHtml = addFurigana(compactJapanese(escapeHtml(answer)));
      const isReasonGroup = group.title === "～ので（理由）" || group.title === "理由";
      const displayedAnswer = isReasonGroup ? addReasonKaraNote(answerHtml) : answerHtml;

      html += `
        <tr>
          <td>${makeWordCell(addFurigana(makeConnectHint(prompt, group.title, rowIndex)))}</td>
          <td><span class="answer-text${isReasonGroup ? " reason-note-answer" : ""}">${displayedAnswer}</span></td>
        </tr>
      `;
    });
  });

  html += `
    </table>
    <div class="scroll-extra-y"></div>
  `;
  document.getElementById("tableArea").innerHTML = html;
}

function scrollToQuestionKey(key) {
  if (!key) return;
  const buttons = Array.from(document.querySelectorAll(".question-box"));
  const target = buttons.find(button => {
    const info = getQuestionInfo(button);
    return info && (info.key === key || info.legacyKey === key);
  });
  if (!target) return;
  target.classList.add("active");
  const row = target.closest("tr");
  if (!row) return;
  const topBar = document.querySelector(".top-bar");
  const topOffset = topBar ? topBar.offsetHeight + 2 : 0;
  const y = row.getBoundingClientRect().top + window.scrollY - topOffset;
  window.scrollTo({ top: Math.max(0, y), behavior: "auto" });
}

  }

  window.scrollTo(0, 0);
}

function makeMasuBodyRow(row, extraClass = "", allowSwap = true) {
  /*
    Vます専用：
    入れ替え前も入れ替え後も、左は黒い問題側、右は赤い答え側にする。
    右側だけ answer-text を付けるので、赤シートと重なった部分だけ消える。
  */
  const shouldSwap = allowSwap && masuSwapped;
  const left = shouldSwap
    ? makeWordCell(row[1])
    : makeWordCell(row[0]);

  const right = shouldSwap
    ? `<span class="answer-text">${row[0]}</span>`
    : `<span class="answer-text">${row[1]}</span>`;

  return `
      <tr class="${extraClass}">
        <td>${left}</td>
        <td>${right}</td>
      </tr>
    `;
}

function makeGroupedExpressionTable(title, data) {
  let html = `
    <table>
      <tr>
        <th>ヒント</th>
        <th>${title}</th>
      </tr>
  `;

  const groups = [
    ["五段動詞", data.godan],
    ["一段動詞", data.ichidan],
    ["不規則動詞", data.irregular]
  ];

  groups.forEach(group => {
    html += `
      <tr class="group-row">
        <td colspan="2">${group[0]}</td>
      </tr>
    `;

    group[1].forEach(row => {
      html += `
        <tr>
          <td>${makeWordCell(row[0])}</td>
          <td><span class="answer-text">${row[1]}</span></td>
        </tr>
      `;
    });
  });

  html += `
    </table>
    <div class="scroll-extra-y"></div>
  `;

  document.getElementById("tableArea").innerHTML = html;

  requestAnimationFrame(() => {
    fitTableTextOneLine();
    adjustScrollExtraHeight();
    updateSheetHiddenText();
  });
}

function resetTableTextTransforms(table) {

function squeezeRightColumnToOneLine(table) {
  const minRightFont = 8;
  const rightAnswers = Array.from(table.querySelectorAll("td:last-child .answer-text"))
    .filter(el => el.offsetParent !== null);

  const useConnectRightCellSizing = true;
  if (useConnectRightCellSizing) {
    const isConjugationTable = table.classList.contains("conjugation-table");
    const getMaxRightFont = (el) => {
      if (!isConjugationTable) return 16;
      const row = el.closest("tr");
      const leftText = row?.querySelector("td:first-child .word-text");
      const leftSize = leftText ? parseFloat(getComputedStyle(leftText).fontSize) : NaN;
      if (Number.isFinite(leftSize) && leftSize > 0) return leftSize;
      const tableSize = parseFloat(getComputedStyle(table).fontSize);
      return Number.isFinite(tableSize) && tableSize > 0 ? tableSize : 18;
    };

    const measureAtMaxFont = (el, cell, maxRightFont) => {
      const clone = el.cloneNode(true);
      clone.querySelectorAll(".answer-mask-cover").forEach(node => node.remove());
      clone.style.position = "absolute";
      clone.style.visibility = "hidden";
      clone.style.pointerEvents = "none";
      clone.style.left = "0";
      clone.style.top = "0";
      clone.style.width = "max-content";
      clone.style.maxWidth = "none";
      clone.style.fontSize = `${maxRightFont}px`;
      clone.style.whiteSpace = "nowrap";
      clone.style.transform = "none";
      cell.appendChild(clone);
      const width = clone.getBoundingClientRect().width;
      clone.remove();
      return width;
    };

    rightAnswers.forEach(el => {
      const cell = el.closest("td");
      if (!cell) return;

      el.style.removeProperty("transform");

      const availableWidth = el.clientWidth;
      if (availableWidth <= 0) return;

      const maxRightFont = getMaxRightFont(el);
      const naturalWidth = measureAtMaxFont(el, cell, maxRightFont);
      if (!Number.isFinite(naturalWidth) || naturalWidth <= 0) return;

      const rawSize = naturalWidth <= availableWidth
        ? maxRightFont
        : (maxRightFont * availableWidth) / naturalWidth;
      let fittedSize = Math.max(1, Math.min(maxRightFont, Math.floor((rawSize - 0.05) * 10) / 10));
      const setFittedSize = size => el.style.setProperty("font-size", `${size}px`, "important");
      const overflows = () => el.scrollWidth > el.clientWidth + 0.1;

      setFittedSize(fittedSize);
      while (fittedSize > 1 && overflows()) {
        fittedSize = Math.max(1, Math.round((fittedSize - 0.1) * 10) / 10);
        setFittedSize(fittedSize);
      }

      while (fittedSize + 0.1 <= maxRightFont) {
        const nextSize = Math.round((fittedSize + 0.1) * 10) / 10;
        setFittedSize(nextSize);
        if (overflows()) {
          setFittedSize(fittedSize);
          break;
        }
        fittedSize = nextSize;
      }
    });

    return;
  }

  rightAnswers.forEach(el => {
    el.style.removeProperty("transform");

    let fontSize = parseFloat(getComputedStyle(el).fontSize);
    if (!Number.isFinite(fontSize)) return;

    while (fontSize > minRightFont && el.scrollWidth > el.clientWidth + 0.5) {
      fontSize -= 1;
      el.style.setProperty("font-size", `${fontSize}px`, "important");
    }

    if (el.scrollWidth > el.clientWidth + 0.5 && el.clientWidth > 0 && el.scrollWidth > 0) {
      const fittedSize = Math.max(1, (fontSize * el.clientWidth) / el.scrollWidth - 0.5);
      el.style.setProperty("font-size", `${fittedSize}px`, "important");
    }
  });
}

function leftTextUsesMoreThanTwoLines(el) {
  const lineHeight = parseFloat(getComputedStyle(el).lineHeight);
  if (!Number.isFinite(lineHeight) || lineHeight <= 0) return false;
  return el.scrollHeight > lineHeight * 2 + 1;
}

function unifyLeftColumnFontSize(table) {
  const leftTexts = Array.from(table.querySelectorAll("td:first-child .word-text"))
    .filter(el => el.offsetParent !== null);
  if (!leftTexts.length) return;

  const smallestSize = leftTexts.reduce((smallest, el) => {
    const size = parseFloat(getComputedStyle(el).fontSize);
    return Number.isFinite(size) ? Math.min(smallest, size) : smallest;
  }, Infinity);

  if (!Number.isFinite(smallestSize)) return;
  leftTexts.forEach(el => {
    el.style.setProperty("font-size", `${smallestSize}px`, "important");
  });
}

function fitTaraHintLines(table) {
  if (!table.classList.contains("tara-table")) return;

  table.querySelectorAll("td:first-child .word-text").forEach(wordText => {
    const lines = Array.from(wordText.querySelectorAll(".tara-hint-line"));
    if (!lines.length) return;

    let fontSize = parseFloat(getComputedStyle(wordText).fontSize);
    if (!Number.isFinite(fontSize)) return;

    const hasOverflow = () => lines.some(line => line.scrollWidth > line.clientWidth + 0.5);

    while (fontSize > 8 && hasOverflow()) {
      fontSize -= 1;
      wordText.style.setProperty("font-size", `${fontSize}px`, "important");
    }

    if (hasOverflow()) {
      const widthRatios = lines
        .filter(line => line.clientWidth > 0 && line.scrollWidth > 0)
        .map(line => line.clientWidth / line.scrollWidth);
      if (widthRatios.length) {
        const fittedSize = Math.max(1, fontSize * Math.min(...widthRatios) - 0.5);
        wordText.style.setProperty("font-size", `${fittedSize}px`, "important");
      }
    }
  });
}

function updateListenPromptBreaks(table) {
  table.querySelectorAll(".listen-prompt").forEach(prompt => {
    const text = prompt.querySelector(".listen-prompt-text");
    if (!text) return;

    prompt.classList.remove("is-text-wrapped");
    if (text.getClientRects().length > 1) {
