    }
  });
}

function listenPromptTextUsesMoreThanTwoLines(el) {
  return el.getClientRects().length > 2;
}

function listenPromptUsesMoreThanTwoLines(el) {
  const prompt = el.closest(".listen-prompt");
  if (!prompt) return false;

  const lineHeight = parseFloat(getComputedStyle(prompt).lineHeight);
  if (!Number.isFinite(lineHeight) || lineHeight <= 0) return false;
  return prompt.getBoundingClientRect().height > lineHeight * 2 + 1;
}

function fitTableTextOneLine() {
  const table = document.querySelector("#tableArea table");
  if (!table) return;

  const maxFont = 18;
  const minTableFont = 15;
  const minCellFont = 15;
  const minLeftFont = 14;
  const minListenPromptFont = 9;
  const minRightFont = 8;
  const wrap = document.querySelector(".table-wrap");
  applyTableModeClasses(table);

  const shrinkTargets = () => Array.from(table.querySelectorAll(
    "th, .word-text, .listen-prompt-text, .answer-text, .group-row td"
  )).filter(el => el.offsetParent !== null);

  const resetFont = () => {
    table.classList.remove("tight-table");
    table.classList.add("fitting-table");
    table.style.setProperty("--table-font-size", `${maxFont}px`);
    table.dataset.fittedFontSize = String(maxFont);
    shrinkTargets().forEach(el => {
      el.style.removeProperty("font-size");
    });
    resetTableTextTransforms(table);
    updateTableAlignmentClasses(table);
  };

  const targets = () => Array.from(table.querySelectorAll(
    "th, td, .word-text, .answer-text, .group-row td"
  )).filter(el => el.offsetParent !== null);

  const isConnectRightAnswer = el => el.matches("td:last-child .answer-text");

  const elementOverflows = (el) => {
    if (isConnectRightAnswer(el)) return false;

    const rect = el.getBoundingClientRect();
    if (rect.width <= 0 || rect.height <= 0) return false;

    if (el.scrollWidth > el.clientWidth + 0.5) return true;

    const cell = el.closest("td, th");
    if (cell && el !== cell) {
      const cellRect = cell.getBoundingClientRect();
      if (rect.left < cellRect.left - 0.5 || rect.right > cellRect.right + 0.5) return true;
    }

    return false;
  };

  const isOverflowing = () => {
    const tableRect = table.getBoundingClientRect();
    const wrapRect = wrap ? wrap.getBoundingClientRect() : tableRect;

    if (tableRect.width > wrapRect.width + 0.5) return true;

    return targets().some(elementOverflows);
  };

  resetFont();
  updateListenPromptBreaks(table);

  let size = maxFont;
  while (size > minTableFont && isOverflowing()) {
    size -= 1;
    table.style.setProperty("--table-font-size", `${size}px`);
  }

  let hasCellShrink = false;
  shrinkTargets().forEach(el => {
    if (isConnectRightAnswer(el)) return;

    let cellSize = size;
    const needsShrink = () => (
      elementOverflows(el)
      || (el.matches(".word-text") && leftTextUsesMoreThanTwoLines(el))
      || (
        el.matches(".listen-prompt-text")
        && (listenPromptTextUsesMoreThanTwoLines(el) || listenPromptUsesMoreThanTwoLines(el))
      )
    );
    const minFont = el.matches(".listen-prompt-text")
      ? minListenPromptFont
      : (el.matches(".word-text") ? minLeftFont : (el.matches(".answer-text") ? minRightFont : minCellFont));
    while (cellSize > minFont && needsShrink()) {
      cellSize -= 1;
      el.style.setProperty("font-size", `${cellSize}px`, "important");
      hasCellShrink = true;
    }
  });

  unifyLeftColumnFontSize(table);
  fitTaraHintLines(table);
  squeezeRightColumnToOneLine(table);
  updateListenPromptBreaks(table);

  table.dataset.fittedFontSize = String(size);
  table.classList.remove("fitting-table");
  table.classList.toggle("tight-table", size < maxFont || hasCellShrink);
  updateTableAlignmentClasses(table);
}
function adjustScrollExtraHeight() {
  const extra = document.querySelector(".scroll-extra-y");
  const table = document.querySelector("#tableArea table");
  const topBar = document.querySelector(".top-bar");

  if (!extra || !table || !topBar) return;

  extra.style.height = "0px";

  const rows = Array.from(table.querySelectorAll("tr"))
    .filter(row => !row.classList.contains("group-row"))
    .filter(row => row.querySelector(".word-text"));

  if (rows.length < 2) {
    extra.style.height = "0px";
    return;
  }

  const secondLastRow = rows[rows.length - 2];

  const scrollY = window.scrollY;
  const rowTopInPage = secondLastRow.getBoundingClientRect().top + scrollY;
  const tableBottomInPage = table.getBoundingClientRect().bottom + scrollY;

  const topBarHeight = topBar.offsetHeight;
  const stopMargin = 8;

  const desiredMaxScroll = rowTopInPage - topBarHeight - stopMargin;
  const neededDocumentHeight = desiredMaxScroll + window.innerHeight;

  let extraHeight = neededDocumentHeight - tableBottomInPage;

  if (extraHeight < 0) {
    extraHeight = 0;
  }

  extra.style.height = `${extraHeight}px`;
}

function startMaskLoop() {

    window.addEventListener("scroll", scheduleMaskUpdate, { passive: true });

function stopMaskLoop() {
  if (maskAnimationId !== null) {

function getSheetPolygon(sheet) {
  const rect = sheet.getBoundingClientRect();
  const style = window.getComputedStyle(sheet);
  const width = sheet.offsetWidth;
  const height = sheet.offsetHeight;
  const originParts = style.transformOrigin.split(" ");
  const originX = Number.parseFloat(originParts[0]) || width;
  const originY = Number.parseFloat(originParts[1]) || height / 2;
  const MatrixConstructor = window.DOMMatrixReadOnly || window.DOMMatrix || window.WebKitCSSMatrix;
  const matrix = MatrixConstructor && style.transform && style.transform !== "none"
    ? new MatrixConstructor(style.transform)
    : { a: 1, b: 0, c: 0, d: 1, e: 0, f: 0 };

  const localCorners = [
    { x: 0, y: 0 },
    { x: width, y: 0 },
    { x: width, y: height },
    { x: 0, y: height }
  ];
  const transformedFromOrigin = localCorners.map(point => ({
    x: matrix.a * (point.x - originX) + matrix.c * (point.y - originY) + matrix.e,
    y: matrix.b * (point.x - originX) + matrix.d * (point.y - originY) + matrix.f
  }));
  const minX = Math.min(...transformedFromOrigin.map(point => point.x));
  const minY = Math.min(...transformedFromOrigin.map(point => point.y));
  const origin = {
    x: rect.left - minX,
    y: rect.top - minY
  };

  return transformedFromOrigin.map(point => ({
    x: origin.x + point.x,
    y: origin.y + point.y
  }));
}

function getPolygonBounds(points) {
  return {
    left: Math.min(...points.map(point => point.x)),
    right: Math.max(...points.map(point => point.x)),
    top: Math.min(...points.map(point => point.y)),
    bottom: Math.max(...points.map(point => point.y))
  };
}

function rectsOverlap(a, b) {
  const overlapX = Math.min(a.right, b.right) - Math.max(a.left, b.left);
  const overlapY = Math.min(a.bottom, b.bottom) - Math.max(a.top, b.top);
  return overlapX > 1.5 && overlapY > 1.5;
}

function pointInRect(point, rect) {
  return point.x >= rect.left && point.x <= rect.right && point.y >= rect.top && point.y <= rect.bottom;
}

function pointInPolygon(point, polygon) {
  let inside = false;
  for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
    const current = polygon[i];
    const previous = polygon[j];
    const crosses = (current.y > point.y) !== (previous.y > point.y)
      && point.x < ((previous.x - current.x) * (point.y - current.y)) / (previous.y - current.y) + current.x;
    if (crosses) inside = !inside;
  }
  return inside;
}

function segmentsIntersect(a, b, c, d) {
  const direction = (p, q, r) => (r.x - p.x) * (q.y - p.y) - (q.x - p.x) * (r.y - p.y);
  const onSegment = (p, q, r) => (
    Math.min(p.x, r.x) <= q.x && q.x <= Math.max(p.x, r.x)
    && Math.min(p.y, r.y) <= q.y && q.y <= Math.max(p.y, r.y)
  );
  const d1 = direction(c, d, a);
  const d2 = direction(c, d, b);
  const d3 = direction(a, b, c);
  const d4 = direction(a, b, d);

  if (((d1 > 0 && d2 < 0) || (d1 < 0 && d2 > 0)) && ((d3 > 0 && d4 < 0) || (d3 < 0 && d4 > 0))) {
    return true;
  }
  return (d1 === 0 && onSegment(c, a, d))
    || (d2 === 0 && onSegment(c, b, d))
    || (d3 === 0 && onSegment(a, c, b))
    || (d4 === 0 && onSegment(a, d, b));
}


function clipPolygonToRect(polygon, rect) {
  const edges = [
    { inside: point => point.x >= rect.left, intersect: (a, b) => intersectWithVertical(a, b, rect.left) },
    { inside: point => point.x <= rect.right, intersect: (a, b) => intersectWithVertical(a, b, rect.right) },
    { inside: point => point.y >= rect.top, intersect: (a, b) => intersectWithHorizontal(a, b, rect.top) },
    { inside: point => point.y <= rect.bottom, intersect: (a, b) => intersectWithHorizontal(a, b, rect.bottom) }
  ];

  return edges.reduce((points, edge) => {
    if (points.length === 0) return points;

    const clipped = [];
    let previous = points[points.length - 1];
    let previousInside = edge.inside(previous);

    points.forEach(current => {
      const currentInside = edge.inside(current);
      if (currentInside) {
        if (!previousInside) clipped.push(edge.intersect(previous, current));
        clipped.push(current);
      } else if (previousInside) {
        clipped.push(edge.intersect(previous, current));
      }
      previous = current;
      previousInside = currentInside;
    });

    return clipped.filter(point => Number.isFinite(point.x) && Number.isFinite(point.y));
  }, polygon);
}

function intersectWithVertical(a, b, x) {
  const dx = b.x - a.x;
  if (Math.abs(dx) < 0.0001) return { x, y: a.y };
  const t = (x - a.x) / dx;
  return { x, y: a.y + (b.y - a.y) * t };
}

function intersectWithHorizontal(a, b, y) {
  const dy = b.y - a.y;
  if (Math.abs(dy) < 0.0001) return { x: a.x, y };
  const t = (y - a.y) / dy;
  return { x: a.x + (b.x - a.x) * t, y };
}

function getPolygonArea(points) {
  if (points.length < 3) return 0;
  return Math.abs(points.reduce((sum, point, index) => {
    const nextPoint = points[(index + 1) % points.length];
    return sum + point.x * nextPoint.y - nextPoint.x * point.y;
  }, 0)) / 2;
}

function polygonIntersectsRect(polygon, rect) {
  if (!rectsOverlap(getPolygonBounds(polygon), rect)) return false;
  const rectPoints = [
    { x: rect.left, y: rect.top },
    { x: rect.right, y: rect.top },
    { x: rect.right, y: rect.bottom },
    { x: rect.left, y: rect.bottom }
  ];
  if (polygon.some(point => pointInRect(point, rect))) return true;
  if (rectPoints.some(point => pointInPolygon(point, polygon))) return true;

  return polygon.some((point, index) => {
    const nextPoint = polygon[(index + 1) % polygon.length];
    return rectPoints.some((rectPoint, rectIndex) => {
      const nextRectPoint = rectPoints[(rectIndex + 1) % rectPoints.length];
      return segmentsIntersect(point, nextPoint, rectPoint, nextRectPoint);
    });
  });
}

function escapeSvgForDataUrl(svg) {
  return svg
    .replace(/#/g, "%23")
    .replace(/</g, "%3C")
    .replace(/>/g, "%3E")
    .replace(/"/g, "'")
    .replace(/\n/g, "")
    .replace(/\s{2,}/g, " ");
}

function getAnswerMaskCover(text) {
  let cover = text.querySelector(":scope > .answer-mask-cover");
  if (!cover) {
    cover = document.createElement("span");
    cover.className = "answer-mask-cover";
    cover.setAttribute("aria-hidden", "true");
    text.appendChild(cover);
  }
  return cover;
}

function getAnswerMaskBackground(text) {
  const colorSource = text.closest("td, th, .phrase-color, .question-box") || text.parentElement || text;
  return window.getComputedStyle(colorSource).backgroundColor || "white";
}

function clearTextMask(text) {
  text.style.webkitMaskImage = "";
  text.style.maskImage = "";
  text.style.webkitMaskSize = "";
  text.style.maskSize = "";
  text.style.webkitMaskRepeat = "";
  text.style.maskRepeat = "";
  text.style.webkitMaskPosition = "";
  text.style.maskPosition = "";
  text.style.webkitClipPath = "";
  text.style.clipPath = "";
  const cover = text.querySelector(":scope > .answer-mask-cover");
  if (cover) cover.remove();
  text.dataset.maskKey = "";
  text.dataset.clipKey = "";
}

function updateSheetHiddenText() {
  const sheet = document.querySelector(".red-sheet");
  const texts = document.querySelectorAll(".answer-text");

  if (!sheet || texts.length === 0) return;

  const sheetPolygon = getSheetPolygon(sheet);
  const snap = value => Math.round(value * 2) / 2;

  texts.forEach(text => {
    const rect = text.getBoundingClientRect();
    if (rect.width <= 0 || rect.height <= 0) {
      if (text.dataset.maskKey || text.dataset.clipKey) clearTextMask(text);
      return;
    }

    const textRect = {
      left: rect.left,
      right: rect.right,
      top: rect.top,
      bottom: rect.bottom
    };

    if (!polygonIntersectsRect(sheetPolygon, textRect)) {
      if (text.dataset.maskKey || text.dataset.clipKey) clearTextMask(text);
      return;
    }

    /*
      赤シートと実際に重なった部分だけをSVGマスクで透明にする。
      先に赤シートの傾いた四角形を文字の外接四角形で切り抜くことで、
      iOS/Safariで画面外まで伸びた大きな多角形が文字全体を消す誤判定を避ける。
      判定自体はCSS transform後の四隅を使うため、平行な外接長方形ではなく傾きを保ったまま扱う。
    */
    const clippedSheetPolygon = clipPolygonToRect(sheetPolygon, textRect);
    if (clippedSheetPolygon.length < 3 || getPolygonArea(clippedSheetPolygon) < 1) {
      if (text.dataset.maskKey || text.dataset.clipKey) clearTextMask(text);
      return;
    }

    const width = Math.max(1, snap(rect.width));
    const height = Math.max(1, snap(rect.height));
    const maskPoints = clippedSheetPolygon.map(point => ({
      x: snap(point.x - rect.left),
      y: snap(point.y - rect.top)
    }));
    const pointsValue = maskPoints.map(point => `${point.x},${point.y}`).join(" ");
    const key = `${width},${height},${pointsValue}`;
    if (text.dataset.clipKey === key) return;

    text.dataset.clipKey = key;
    text.dataset.maskKey = "";

    text.style.webkitMaskImage = "";
    text.style.maskImage = "";
    text.style.webkitMaskSize = "";
    text.style.maskSize = "";
    text.style.webkitMaskRepeat = "";
    text.style.maskRepeat = "";
    text.style.webkitMaskPosition = "";
    text.style.maskPosition = "";
    text.style.webkitClipPath = "";
    text.style.clipPath = "";

    const cover = getAnswerMaskCover(text);
    const polygonValue = maskPoints.map(point => `${point.x}px ${point.y}px`).join(", ");
    cover.style.setProperty("--answer-mask-bg", getAnswerMaskBackground(text));
    cover.style.webkitClipPath = `polygon(${polygonValue})`;
    cover.style.clipPath = `polygon(${polygonValue})`;
  });
}
function preventMobileZoom() {
  let lastTouchEnd = 0;

  document.addEventListener("gesturestart", e => e.preventDefault(), { passive: false });
  document.addEventListener("gesturechange", e => e.preventDefault(), { passive: false });
  document.addEventListener("gestureend", e => e.preventDefault(), { passive: false });

  document.addEventListener("dblclick", e => {
    e.preventDefault();
  }, { passive: false });

  document.addEventListener("touchend", e => {
    const now = Date.now();
    const isInteractive = e.target.closest("button, a, input, select, textarea, [role='button']");
    if (!isInteractive && now - lastTouchEnd <= 360) {
      e.preventDefault();
    }
    lastTouchEnd = now;
  }, { passive: false });

  document.addEventListener("touchmove", e => {
    if (e.touches && e.touches.length > 1) {
      e.preventDefault();
    }
  }, { passive: false });
}

preventMobileZoom();

window.addEventListener("resize", () => {
  requestAnimationFrame(() => {
    fitTableTextOneLine();
    adjustScrollExtraHeight();
    updateSheetHiddenText();
    renderQuestionMemoLayer();
  });
});

window.addEventListener("orientationchange", () => {
  requestAnimationFrame(() => {
    fitTableTextOneLine();
    adjustScrollExtraHeight();
    updateSheetHiddenText();
    renderQuestionMemoLayer();
  });
});

window.addEventListener("load", () => {
  bootstrapQuestionStorePersistence();
  setHomeMenu("main");
  updateMenuPage();
  renderQuestionMemoLayer();
  requestAnimationFrame(() => {
    fitTableTextOneLine();
    adjustScrollExtraHeight();
    updateSheetHiddenText();
  });
});

window.addEventListener("pagehide", flushQuestionStoreBeforeHide);
window.addEventListener("beforeunload", flushQuestionStoreBeforeHide);

window.addEventListener("storage", e => {
  if (!e.key || !e.key.startsWith(QUESTION_STORAGE_PREFIX)) return;
  const merged = cleanQuestionStoreItems([safeParseQuestionStore(), parseQuestionStoreValue(e.newValue)]);
  saveQuestionStore(merged);
  restoreQuestionMarks();
  renderQuestionMemoLayer();
});

window.addEventListener("resize", () => {
  fitTableTextOneLine();
  adjustScrollExtraHeight();
  updateSheetHiddenText();
  renderQuestionMemoLayer();
});


if (document.fonts && document.fonts.ready) {
  document.fonts.ready.then(() => {
    fitTableTextOneLine();
    adjustScrollExtraHeight();
    updateSheetHiddenText();
  });
}

</script>
